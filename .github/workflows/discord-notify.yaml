---
name: Discord Notifications

on:
  push:
    branches: [main]
    paths:
      - kubernetes/**
  pull_request:
    types: [opened, closed]
    branches: [main]

jobs:
  notify-push:
    name: Notify on Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit
        run: |
          # Get changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '\.ya?ml$' | head -10 | tr '\n' ', ' | sed 's/,$//')

          # Extract version changes from commit
          VERSIONS=$(git diff HEAD~1 HEAD -- '*.yaml' '*.yml' | grep -E '^\+.*tag:|^\+.*version:' | sed 's/+/→/' | head -5 | tr '\n' ' ')

          # Get commit message
          MESSAGE=$(git log -1 --pretty=%B | head -1)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          COMMIT_VERSIONS: ${{ steps.commit.outputs.versions }}
          COMMIT_CHANGED: ${{ steps.commit.outputs.changed }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Color based on commit type
          if [[ "$COMMIT_MSG" == *"chore(deps)"* ]]; then
            COLOR=3447003  # Blue for dependency updates
            TITLE="📦 Dependency Update"
          elif [[ "$COMMIT_MSG" == *"feat"* ]]; then
            COLOR=3066993  # Green for features
            TITLE="✨ New Feature"
          elif [[ "$COMMIT_MSG" == *"fix"* ]]; then
            COLOR=15158332  # Red for fixes
            TITLE="🔧 Bug Fix"
          else
            COLOR=9807270  # Gray for other
            TITLE="📝 Update"
          fi

          DESC="$COMMIT_MSG"
          if [[ -n "$COMMIT_VERSIONS" ]]; then
            DESC="$DESC\n\n**Version changes:**\n\`\`\`$COMMIT_VERSIONS\`\`\`"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --argjson color "$COLOR" \
            --arg changed "$COMMIT_CHANGED" \
            --arg repo "$REPO_NAME" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: $desc, color: $color, fields: [{name: "Files Changed", value: ("`" + $changed + "`"), inline: false}], footer: {text: $repo}, timestamp: $ts}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

  notify-pr:
    name: Notify on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PR_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          REPO_NAME: ${{ github.repository }}
        run: |
          if [[ "$PR_ACTION" == "opened" ]]; then
            COLOR=16776960  # Yellow
            TITLE="🔔 New PR: $PR_TITLE"
            DESC="**Author:** $PR_AUTHOR\n**Branch:** \`$PR_BRANCH\`\n\n[View PR]($PR_URL)"
          elif [[ "$PR_ACTION" == "closed" && "$PR_MERGED" == "true" ]]; then
            COLOR=3066993  # Green
            TITLE="✅ PR Merged: $PR_TITLE"
            DESC="Merged by **$PR_MERGED_BY**\n\n[View PR]($PR_URL)"
          else
            exit 0  # Don't notify on closed without merge
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --argjson color "$COLOR" \
            --arg repo "$REPO_NAME" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: $desc, color: $color, footer: {text: $repo}, timestamp: $ts}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
