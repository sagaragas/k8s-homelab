---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Optimus Route Contract: External-LXC Backend
# This Kustomization manages the Service, Endpoints, and HTTPRoute for the
# external Optimus service running on the ansible LXC at 172.16.1.9:8080.
# No Deployment is included - Optimus runs outside the cluster.
resources:
  - service.yaml
  - httproute.yaml
commonLabels:
  app.kubernetes.io/name: optimus
  app.kubernetes.io/part-of: optimus-platform
